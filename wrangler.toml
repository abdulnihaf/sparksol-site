name = "sparksol-site"
pages_build_output_dir = "."
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[vars]
WHATSAPP_NUMBER = "918008002049"
SITE_URL = "https://sparksol.in"

# Secrets (set via: wrangler pages secret put <NAME>)
# WA_ACCESS_TOKEN       — SparkSol WABA bearer token
# WA_PHONE_ID           — SparkSol WABA phone number ID
# DASHBOARD_KEY         — Admin API key for lead dashboard

[[d1_databases]]
binding = "DB"
database_name = "sparksol-leads"
database_id = "TBD"
